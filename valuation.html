<!DOCTYPE html>
<html>
<head>
  <title>Home Value Estimator</title>
</head>
<body style="font-family: Arial; text-align: center; padding: 50px;">

<h1>Find Your Home Value</h1>

<p>Enter your address to get an estimate</p>

<input id="address" type="text" placeholder="123 Main St, Miami, FL" style="width:300px; padding:10px;">

<br><br>

<button onclick="getEstimate()">Get Estimate</button>

<div id="result" style="margin-top:20px; font-weight:bold;"></div>

<script>
function getEstimate() {
  const address = document.getElementById('address').value;

  if (!address) {
    document.getElementById('result').innerHTML = "Please enter an address";
    return;
  }

  // Fake estimate (for now)
  const estimate = "$" + (300000 + Math.floor(Math.random() * 200000));

  document.getElementById('result').innerHTML = `
    Estimated Value: ${estimate}<br><br>
    Want to list your home for this price?<br>
    <a href="/assistant.html">Get started</a>
  `;
}
</script>

</body>
</html>
